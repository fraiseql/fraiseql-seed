name: Test All Packages

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fraiseql
          POSTGRES_PASSWORD: fraiseql
          POSTGRES_DB: fraiseql_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://fraiseql:fraiseql@localhost:5432/fraiseql_test
      TEST_DATABASE_URL: postgresql://fraiseql:fraiseql@localhost:5432/fraiseql_test

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Lint with ruff
      run: uv run ruff check packages/

    - name: Type check with ty
      run: uv run ty check

    - name: Test fraiseql-uuid
      run: |
        cd packages/fraiseql-uuid
        uv run pytest --cov=fraiseql_uuid --cov-report=xml

    - name: Test fraiseql-data
      run: |
        cd packages/fraiseql-data
        uv run pytest --cov=fraiseql_data --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./packages/fraiseql-uuid/coverage.xml,./packages/fraiseql-data/coverage.xml
        fail_ci_if_error: false
